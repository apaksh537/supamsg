<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Broadcast</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  -webkit-font-smoothing: antialiased;
  background: #FFFFFF;
  color: #111B21;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  height: 100vh;
}
.panel-header {
  height: 48px;
  display: flex;
  align-items: center;
  padding: 0 16px;
  border-bottom: 1px solid #E8E8E8;
  -webkit-app-region: drag;
  flex-shrink: 0;
}
.panel-title { font-size: 16px; font-weight: 600; color: #111B21; flex: 1; }
.panel-close {
  width: 28px; height: 28px; border-radius: 6px; border: none;
  background: none; color: #667781; font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  -webkit-app-region: no-drag;
  transition: all 0.15s;
}
.panel-close:hover { background: #F0F2F5; color: #111B21; }
.panel-body { flex: 1; overflow-y: auto; padding: 20px; }
.form-label { font-size: 12px; font-weight: 500; color: #667781; margin-bottom: 4px; display: block; }
.form-input {
  width: 100%; height: 40px; padding: 0 12px;
  background: #F0F2F5; border: none; border-radius: 8px;
  font-size: 14px; color: #111B21; outline: none;
  margin-bottom: 12px;
}
.form-input:focus { box-shadow: 0 0 0 2px rgba(37,211,102,0.3); }
textarea.form-input { height: 80px; padding: 10px 12px; resize: none; }
.form-btn {
  width: 100%; height: 40px; border: none; border-radius: 8px;
  background: #25D366; color: #fff; font-size: 14px; font-weight: 500;
  cursor: pointer; transition: background 0.15s;
}
.form-btn:hover { background: #1FAA59; }
.section-label { font-size: 11px; font-weight: 600; color: #667781; text-transform: uppercase; letter-spacing: 1px; margin: 16px 0 8px; }
.divider { height: 1px; background: #E8E8E8; margin: 12px 0; }
.campaign-item {
  display: flex; align-items: center; gap: 12px;
  padding: 12px; border-radius: 8px; background: #F0F2F5;
  margin-bottom: 8px;
}
.campaign-item .info { flex: 1; }
.campaign-item .name { font-size: 13px; font-weight: 500; color: #111B21; }
.campaign-item .meta { font-size: 11px; color: #667781; margin-top: 2px; }
.badge {
  display: inline-block; padding: 3px 8px; border-radius: 10px;
  font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;
}
.badge-active { background: #E8F8EE; color: #1FAA59; }
.badge-draft { background: #F0F2F5; color: #667781; }
.badge-completed { background: #E8F0FE; color: #4285F4; }
</style>
</head>
<body>
  <div class="panel-header">
    <span class="panel-title">Broadcast</span>
    <button class="panel-close" onclick="hub.closePanel('broadcast')">&times;</button>
  </div>
  <div class="panel-body">
    <div class="section-label">Campaigns</div>

    <div class="campaign-item">
      <div class="info">
        <div class="name">Weekend Sale Announcement</div>
        <div class="meta">120 recipients &middot; Sent 45/120</div>
      </div>
      <span class="badge badge-active">Active</span>
    </div>

    <div class="campaign-item">
      <div class="info">
        <div class="name">New Year Greetings</div>
        <div class="meta">85 recipients &middot; Completed</div>
      </div>
      <span class="badge badge-completed">Done</span>
    </div>

    <div class="divider"></div>
    <div class="section-label">New Campaign</div>

    <label class="form-label">Campaign Name</label>
    <input class="form-input" id="campaign-name" type="text" placeholder="e.g. March Promo" />

    <label class="form-label">Message</label>
    <textarea class="form-input" id="campaign-msg" placeholder="Hi {{name}}, ..."></textarea>

    <label class="form-label">Recipients (comma-separated phones)</label>
    <input class="form-input" id="campaign-recipients" type="text" placeholder="+91..., +91..." />

    <button class="form-btn" id="create-campaign-btn">Create Campaign</button>
  </div>

  <script>
    document.getElementById('create-campaign-btn').addEventListener('click', () => {
      const name = document.getElementById('campaign-name').value;
      const message = document.getElementById('campaign-msg').value;
      const recipients = document.getElementById('campaign-recipients').value
        .split(',').map(s => s.trim()).filter(Boolean);
      if (!name || !message || !recipients.length) return;
      hub.saveCampaign({ name, message, recipients });
      hub.closePanel('broadcast');
    });
  </script>
</body>
</html>
