<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Feedback</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  -webkit-font-smoothing: antialiased;
  background: #FFFFFF; color: #111B21;
  overflow: hidden; display: flex; flex-direction: column; height: 100vh;
}
.panel-header {
  height: 48px; display: flex; align-items: center; padding: 0 16px;
  border-bottom: 1px solid #E8E8E8; -webkit-app-region: drag; flex-shrink: 0;
}
.panel-title { font-size: 16px; font-weight: 600; flex: 1; }
.panel-close {
  width: 28px; height: 28px; border-radius: 6px; border: none; background: none;
  color: #667781; font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  -webkit-app-region: no-drag; transition: all 0.15s;
}
.panel-close:hover { background: #F0F2F5; color: #111B21; }
.panel-body { flex: 1; overflow-y: auto; padding: 20px; }

/* Tabs */
.tabs {
  display: flex; gap: 0; margin-bottom: 20px;
  border: 1px solid #E8E8E8; border-radius: 8px; overflow: hidden;
}
.tab {
  flex: 1; padding: 10px 8px; text-align: center;
  font-size: 13px; font-weight: 500; color: #667781;
  cursor: pointer; background: #FAFAFA; border: none;
  transition: all 0.15s; border-right: 1px solid #E8E8E8;
}
.tab:last-child { border-right: none; }
.tab:hover { background: #F0F2F5; }
.tab.active { background: #fff; color: #25D366; font-weight: 600; }

/* Form */
.form-label {
  font-size: 12px; font-weight: 600; color: #667781;
  text-transform: uppercase; letter-spacing: 0.5px;
  margin-bottom: 6px; display: block;
}
.form-textarea {
  width: 100%; height: 140px; padding: 12px; background: #F0F2F5;
  border: none; border-radius: 8px; font-size: 14px; color: #111B21;
  outline: none; resize: none; font-family: inherit; margin-bottom: 16px;
}
.form-textarea:focus { box-shadow: 0 0 0 2px rgba(37,211,102,0.3); }
.form-textarea::placeholder { color: #8696A0; }
.form-input {
  width: 100%; height: 40px; padding: 0 12px; background: #F0F2F5;
  border: none; border-radius: 8px; font-size: 14px; color: #111B21;
  outline: none; margin-bottom: 16px;
}
.form-input:focus { box-shadow: 0 0 0 2px rgba(37,211,102,0.3); }
.form-input::placeholder { color: #8696A0; }
.form-btn {
  width: 100%; height: 40px; border: none; border-radius: 8px;
  background: #25D366; color: #fff; font-size: 14px; font-weight: 500;
  cursor: pointer; transition: background 0.15s;
}
.form-btn:hover { background: #1FAA59; }
.form-btn:disabled { background: #CED0D1; cursor: not-allowed; }

.category-tag {
  display: inline-block; padding: 4px 10px; border-radius: 12px;
  font-size: 11px; font-weight: 600; margin-bottom: 16px;
}
.category-tag.feature { background: #E8F5E9; color: #2E7D32; }
.category-tag.bug { background: #FFF3E0; color: #E65100; }
.category-tag.general { background: #E3F2FD; color: #1565C0; }

.success-msg {
  display: none; text-align: center; padding: 24px;
}
.success-msg.visible { display: block; }
.success-icon { font-size: 36px; margin-bottom: 12px; }
.success-text { font-size: 15px; font-weight: 500; color: #111B21; margin-bottom: 4px; }
.success-sub { font-size: 13px; color: #667781; }

.error-msg {
  display: none; padding: 8px 12px; background: #FFF5F5; border: 1px solid #FED7D7;
  border-radius: 6px; font-size: 13px; color: #E53E3E; margin-bottom: 12px;
}
.error-msg.visible { display: block; }
</style>
</head>
<body>

<div class="panel-header">
  <span class="panel-title">Feedback</span>
  <button class="panel-close" id="closeBtn">&times;</button>
</div>

<div class="panel-body">
  <div class="tabs">
    <button class="tab active" data-tab="feature">Feature Request</button>
    <button class="tab" data-tab="bug">Bug Report</button>
    <button class="tab" data-tab="general">General Feedback</button>
  </div>

  <div id="formSection">
    <span class="category-tag feature" id="categoryTag">Feature Request</span>

    <label class="form-label">Your message</label>
    <textarea class="form-textarea" id="messageInput" placeholder="Tell us what you'd like to see..."></textarea>

    <label class="form-label">Email (optional)</label>
    <input class="form-input" id="emailInput" type="email" placeholder="your@email.com — so we can follow up">

    <div class="error-msg" id="errorMsg"></div>

    <button class="form-btn" id="sendBtn">Send Feedback</button>
  </div>

  <div class="success-msg" id="successMsg">
    <div class="success-icon">&#10003;</div>
    <div class="success-text">Thank you for your feedback!</div>
    <div class="success-sub">We read every message and will use it to improve SupaMsg.</div>
  </div>
</div>

<script>
  const tabs = document.querySelectorAll('.tab');
  const categoryTag = document.getElementById('categoryTag');
  const messageInput = document.getElementById('messageInput');
  const emailInput = document.getElementById('emailInput');
  const sendBtn = document.getElementById('sendBtn');
  const formSection = document.getElementById('formSection');
  const successMsg = document.getElementById('successMsg');
  const errorMsg = document.getElementById('errorMsg');

  let activeTab = 'feature';

  const tabConfig = {
    feature: { label: 'Feature Request', tagClass: 'feature', placeholder: "Tell us what you'd like to see..." },
    bug: { label: 'Bug Report', tagClass: 'bug', placeholder: 'Describe the bug — what happened and what you expected...' },
    general: { label: 'General Feedback', tagClass: 'general', placeholder: 'Share your thoughts about SupaMsg...' },
  };

  tabs.forEach(tab => {
    tab.addEventListener('click', () => {
      tabs.forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      activeTab = tab.dataset.tab;

      const cfg = tabConfig[activeTab];
      categoryTag.textContent = cfg.label;
      categoryTag.className = 'category-tag ' + cfg.tagClass;
      messageInput.placeholder = cfg.placeholder;
      errorMsg.classList.remove('visible');
    });
  });

  sendBtn.addEventListener('click', async () => {
    const message = messageInput.value.trim();
    if (!message) {
      errorMsg.textContent = 'Please enter a message.';
      errorMsg.classList.add('visible');
      return;
    }

    errorMsg.classList.remove('visible');
    sendBtn.disabled = true;
    sendBtn.textContent = 'Sending...';

    try {
      await hub.sendFeedback({
        type: activeTab,
        message: message,
        email: emailInput.value.trim() || null,
        platform: navigator.platform,
      });

      hub.trackEvent('feedback_sent', { type: activeTab });
      formSection.style.display = 'none';
      successMsg.classList.add('visible');

      setTimeout(() => {
        formSection.style.display = '';
        successMsg.classList.remove('visible');
        messageInput.value = '';
        emailInput.value = '';
        sendBtn.disabled = false;
        sendBtn.textContent = 'Send Feedback';
      }, 3000);
    } catch (err) {
      errorMsg.textContent = 'Failed to send feedback. Please try again.';
      errorMsg.classList.add('visible');
      sendBtn.disabled = false;
      sendBtn.textContent = 'Send Feedback';
    }
  });

  document.getElementById('closeBtn').addEventListener('click', () => {
    hub.closePanel('feedback');
  });
</script>
</body>
</html>
