<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schedule Message</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  -webkit-font-smoothing: antialiased;
  background: #FFFFFF;
  color: #111B21;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  height: 100vh;
}
.panel-header {
  height: 48px;
  display: flex;
  align-items: center;
  padding: 0 16px;
  border-bottom: 1px solid #E8E8E8;
  -webkit-app-region: drag;
  flex-shrink: 0;
}
.panel-title { font-size: 16px; font-weight: 600; color: #111B21; flex: 1; }
.panel-close {
  width: 28px; height: 28px; border-radius: 6px; border: none;
  background: none; color: #667781; font-size: 18px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  -webkit-app-region: no-drag;
  transition: all 0.15s;
}
.panel-close:hover { background: #F0F2F5; color: #111B21; }
.panel-body { flex: 1; overflow-y: auto; padding: 20px; }
.form-label { font-size: 12px; font-weight: 500; color: #667781; margin-bottom: 4px; display: block; }
.form-input {
  width: 100%; height: 40px; padding: 0 12px;
  background: #F0F2F5; border: none; border-radius: 8px;
  font-size: 14px; color: #111B21; outline: none;
  margin-bottom: 12px;
}
.form-input:focus { box-shadow: 0 0 0 2px rgba(37,211,102,0.3); }
textarea.form-input { height: 80px; padding: 10px 12px; resize: none; }
.form-btn {
  width: 100%; height: 40px; border: none; border-radius: 8px;
  background: #25D366; color: #fff; font-size: 14px; font-weight: 500;
  cursor: pointer; transition: background 0.15s;
}
.form-btn:hover { background: #1FAA59; }
.section-label { font-size: 11px; font-weight: 600; color: #667781; text-transform: uppercase; letter-spacing: 1px; margin: 16px 0 8px; }
.divider { height: 1px; background: #E8E8E8; margin: 12px 0; }
.scheduled-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px; border-radius: 8px; background: #F0F2F5;
  margin-bottom: 8px;
}
.scheduled-item .info { flex: 1; }
.scheduled-item .info .name { font-size: 13px; font-weight: 500; color: #111B21; }
.scheduled-item .info .time { font-size: 11px; color: #667781; margin-top: 2px; }
.scheduled-item .cancel-btn {
  font-size: 11px; color: #E74C3C; background: none; border: none;
  cursor: pointer; font-weight: 500;
}
.scheduled-item .cancel-btn:hover { text-decoration: underline; }
.row { display: flex; gap: 12px; }
.row > * { flex: 1; }
</style>
</head>
<body>
  <div class="panel-header">
    <span class="panel-title">Schedule Message</span>
    <button class="panel-close" onclick="hub.closePanel('schedule')">&times;</button>
  </div>
  <div class="panel-body">
    <label class="form-label">Account</label>
    <select class="form-input" id="account-select">
      <option value="">Select account...</option>
    </select>

    <label class="form-label">Contact / Phone</label>
    <input class="form-input" id="contact-input" type="text" placeholder="Name or +91..." />

    <label class="form-label">Message</label>
    <textarea class="form-input" id="message-input" placeholder="Type your message..."></textarea>

    <div class="row">
      <div>
        <label class="form-label">Date</label>
        <input class="form-input" id="date-input" type="date" />
      </div>
      <div>
        <label class="form-label">Time</label>
        <input class="form-input" id="time-input" type="time" />
      </div>
    </div>

    <button class="form-btn" id="schedule-btn">Schedule</button>

    <div class="divider"></div>
    <div class="section-label">Upcoming</div>

    <div class="scheduled-item">
      <div class="info">
        <div class="name">Rahul Sharma</div>
        <div class="time">Today, 6:30 PM &mdash; "Hey, following up on..."</div>
      </div>
      <button class="cancel-btn">Cancel</button>
    </div>

    <div class="scheduled-item">
      <div class="info">
        <div class="name">Priya Nair</div>
        <div class="time">Tomorrow, 9:00 AM &mdash; "Good morning! Just..."</div>
      </div>
      <button class="cancel-btn">Cancel</button>
    </div>
  </div>

  <script>
    // Set default date/time to now + 1 hour
    const now = new Date(Date.now() + 3600000);
    document.getElementById('date-input').value = now.toISOString().split('T')[0];
    document.getElementById('time-input').value = now.toTimeString().slice(0, 5);

    document.getElementById('schedule-btn').addEventListener('click', () => {
      const contact = document.getElementById('contact-input').value;
      const message = document.getElementById('message-input').value;
      const date = document.getElementById('date-input').value;
      const time = document.getElementById('time-input').value;
      if (!contact || !message || !date || !time) return;
      hub.addSchedule({ contact, message, scheduledAt: `${date}T${time}` });
      hub.closePanel('schedule');
    });
  </script>
</body>
</html>
