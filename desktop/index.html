<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SupaMsg</title>
<style>
  /* ── Reset ── */
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100%; height: 100vh; overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    background: #fff;
  }

  body {
    display: flex;
    flex-direction: row;
  }

  /* ── Nav Panel (200px, Notion-style) ── */
  .nav-panel {
    width: 200px;
    min-width: 200px;
    background: #FAFAFA;
    border-right: 1px solid #E8E8E8;
    display: flex;
    flex-direction: column;
    padding-top: 44px;
    z-index: 10;
    overflow-y: auto;
    overflow-x: hidden;
    -webkit-app-region: drag;
    flex-shrink: 0;
  }
  .nav-panel::-webkit-scrollbar { width: 4px; }
  .nav-panel::-webkit-scrollbar-thumb { background: #ccc; border-radius: 2px; }

  .nav-title {
    padding: 0 16px 16px;
    display: flex;
    align-items: baseline;
    gap: 6px;
    -webkit-app-region: drag;
  }
  .nav-title-name { font-size: 14px; font-weight: 600; color: #111B21; }
  .nav-title-version { font-size: 12px; font-weight: 400; color: #667781; }

  .nav-section-label {
    font-size: 11px; font-weight: 600; color: #667781;
    text-transform: uppercase; letter-spacing: 1px;
    padding: 0 16px; margin-bottom: 8px;
  }

  /* ── Account Items ── */
  .nav-account-list { padding: 0 8px; margin-bottom: 8px; }

  .nav-account-item {
    display: flex; align-items: center; gap: 10px;
    padding: 8px; border-radius: 6px;
    cursor: pointer; transition: all 0.15s ease;
    position: relative;
    -webkit-app-region: no-drag;
  }
  .nav-account-item:hover { background: #F0F2F5; }
  .nav-account-item.active { background: #F0FFF4; border-left: 2px solid #25D366; padding-left: 6px; }
  .nav-account-item.dragging { opacity: 0.5; }

  .nav-account-avatar {
    width: 32px; height: 32px; min-width: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600; color: #fff;
    position: relative;
  }
  .nav-account-avatar .status-dot {
    position: absolute; bottom: 0; right: 0;
    width: 8px; height: 8px; border-radius: 50%;
    border: 1.5px solid #FAFAFA;
    background: #25D366;
  }

  .nav-account-details { flex: 1; min-width: 0; }
  .nav-account-name {
    font-size: 14px; font-weight: 500; color: #111B21;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .nav-account-badge {
    background: #EF4444; color: #fff;
    font-size: 10px; font-weight: 700;
    min-width: 18px; height: 18px; border-radius: 9px;
    display: none; align-items: center; justify-content: center;
    padding: 0 5px;
  }
  .nav-account-badge.has-unread { display: flex; }

  .nav-add-account {
    display: flex; align-items: center; gap: 6px;
    padding: 8px 16px; cursor: pointer;
    transition: all 0.15s ease; margin-bottom: 4px;
    -webkit-app-region: no-drag;
  }
  .nav-add-account:hover { background: #F0F2F5; }
  .nav-add-account span { font-size: 14px; color: #25D366; font-weight: 500; }

  .nav-divider { height: 1px; background: #E8E8E8; margin: 8px 16px; }

  /* ── Tool Items ── */
  .nav-tool-list { padding: 0 8px; }

  .nav-tool-item {
    display: flex; align-items: center; gap: 10px;
    padding: 0 8px; height: 36px; border-radius: 6px;
    cursor: pointer; transition: all 0.15s ease;
    -webkit-app-region: no-drag;
  }
  .nav-tool-item:hover { background: #F0F2F5; }
  .nav-tool-item:hover svg { color: #111B21; }
  .nav-tool-item svg {
    width: 18px; height: 18px; min-width: 18px;
    color: #667781; transition: color 0.15s ease;
  }
  .nav-tool-item span { font-size: 14px; color: #111B21; }

  .nav-spacer { flex: 1; }

  .nav-bottom-section { padding: 0 8px; }

  .nav-footer {
    padding: 12px 16px;
    border-top: 1px solid #E8E8E8;
    margin-top: 8px;
    -webkit-app-region: no-drag;
  }
  .nav-footer span { font-size: 12px; color: #667781; }
  .nav-footer a {
    font-size: 12px; color: #25D366; text-decoration: none;
    cursor: pointer; font-weight: 500;
  }
  .nav-footer a:hover { text-decoration: underline; }

  /* ── BrowserView Area ── */
  .view-area {
    flex: 1;
    background: #fff;
    position: relative;
  }

  /* ── DND Banner ── */
  .dnd-banner {
    display: none; padding: 6px 12px; background: #FFF3CD;
    border-bottom: 1px solid #FFE69C;
    font-size: 12px; color: #856404; text-align: center; cursor: pointer;
    -webkit-app-region: no-drag;
  }
  .dnd-banner.active { display: block; }

  /* ── Update Banner ── */
  .update-banner {
    display: none; padding: 6px 12px; background: #D4EDDA;
    border-bottom: 1px solid #C3E6CB;
    font-size: 12px; color: #155724; text-align: center; cursor: pointer;
    -webkit-app-region: no-drag;
  }
  .update-banner.active { display: block; }

  /* ── Upgrade Banner (inline) ── */
  .upgrade-banner {
    display: none;
    position: fixed; bottom: 0; left: 200px; right: 0;
    padding: 10px 16px;
    background: linear-gradient(135deg, #25D366, #128C7E);
    color: #fff; font-size: 13px; font-weight: 500;
    z-index: 100;
    align-items: center; justify-content: center; gap: 12px;
  }
  .upgrade-banner.visible { display: flex; }
  .upgrade-banner-text { flex: 1; text-align: center; }
  .upgrade-banner-btn {
    background: #fff; color: #128C7E; border: none; border-radius: 6px;
    padding: 6px 16px; font-size: 13px; font-weight: 600; cursor: pointer;
  }
  .upgrade-banner-dismiss {
    background: none; border: none; color: rgba(255,255,255,0.8);
    font-size: 18px; cursor: pointer; padding: 0 4px;
  }

  /* ── Context menu (right-click on accounts) ── */
  .context-menu {
    position: fixed; background: #fff; border-radius: 8px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
    padding: 4px 0; z-index: 9999; min-width: 160px;
    font-size: 14px; color: #303030; display: none;
  }
  .context-menu.visible { display: block; }
  .context-menu-item {
    padding: 8px 16px; cursor: pointer;
  }
  .context-menu-item:hover { background: #f5f5f5; }
  .context-menu-item.danger { color: #FF3B30; }
  .context-menu-item.danger:hover { background: #fff5f5; }
  .context-menu-divider { height: 1px; background: #e8e8e8; margin: 4px 0; }
</style>
</head>
<body>

  <!-- Nav Panel -->
  <nav class="nav-panel">
    <div class="nav-title">
      <span class="nav-title-name">SupaMsg</span>
      <span class="nav-title-version">v2</span>
    </div>

    <div class="nav-section-label">Accounts</div>
    <div class="nav-account-list" id="accountTabs">
      <!-- Rendered by JS -->
    </div>
    <div class="nav-add-account" id="addBtn">
      <span>+ Add Account</span>
    </div>

    <div class="nav-divider"></div>

    <div class="nav-section-label" style="margin-top: 4px;">Tools</div>
    <div class="nav-tool-list">
      <div class="nav-tool-item" id="btnSchedule">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 15 14"/></svg>
        <span>Schedule</span>
      </div>
      <div class="nav-tool-item" id="btnTemplates">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><line x1="9" y1="9" x2="15" y2="9"/><line x1="9" y1="13" x2="13" y2="13"/></svg>
        <span>Quick Replies</span>
      </div>
      <div class="nav-tool-item" id="btnAI">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2l2.4 7.2H22l-6 4.8 2.4 7.2L12 16.4 5.6 21.2 8 14 2 9.2h7.6z"/></svg>
        <span>AI Helper</span>
      </div>
      <div class="nav-tool-item" id="btnBroadcast">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M2 8 L6 10 L2 14" transform="translate(-1,0)"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
        <span>Broadcast</span>
      </div>
      <div class="nav-tool-item" id="btnAnalytics">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="14" width="4" height="6" rx="1"/><rect x="10" y="10" width="4" height="10" rx="1"/><rect x="16" y="6" width="4" height="14" rx="1"/></svg>
        <span>Dashboard</span>
      </div>
    </div>

    <div class="nav-spacer"></div>

    <div class="nav-divider"></div>

    <div class="nav-bottom-section">
      <div class="nav-tool-item" id="btnPairMobile">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="3"/><line x1="12" y1="18" x2="12" y2="18.01" stroke-width="2.5"/></svg>
        <span>Connect Phone</span>
      </div>
      <div class="nav-tool-item" id="btnSettings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span>Settings</span>
      </div>
    </div>

    <div style="padding:8px 12px;margin-top:4px">
      <div style="font-size:10px;color:#8696A0;display:flex;align-items:center;gap:4px">
        <span>&#128274;</span> Your messages are end-to-end encrypted
      </div>
    </div>
    <div class="nav-footer" id="navFooter">
      <span>Free Plan &middot; </span><a href="#" id="footerUpgradeLink">Upgrade</a>
    </div>
  </nav>

  <!-- BrowserView area (managed by main.js) -->
  <div class="view-area">
    <div class="dnd-banner" id="dndBanner">Do Not Disturb is on — click to disable</div>
    <div class="update-banner" id="updateBanner"></div>
  </div>

  <!-- Upgrade banner (inline, bottom of screen) -->
  <div class="upgrade-banner" id="upgradeBanner">
    <span class="upgrade-banner-text" id="upgradeBannerText">Unlock Pro features — $9/mo</span>
    <button class="upgrade-banner-btn" id="upgradeBannerBtn">Upgrade</button>
    <button class="upgrade-banner-dismiss" id="upgradeBannerDismiss">&times;</button>
  </div>

  <!-- Context menu (right-click on accounts) -->
  <div class="context-menu" id="tabContextMenu"></div>

  <script>
    // ── Dialog helpers (native Electron dialogs above BrowserViews) ──
    function showDialog({ title, message, placeholder, defaultValue, isConfirm }) {
      if (isConfirm) {
        return hub.showConfirmDialog({ title, message });
      }
      return hub.showInputDialog({ title, message, placeholder, defaultValue });
    }

    // ── State ──
    let currentAccounts = [];
    let activeId = null;
    let unreadCounts = {};
    let currentSettings = {};
    let dragSrcId = null;

    function escapeHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
    }

    // ── Context menu (right-click on accounts) ──
    function showTabContextMenu(x, y, account) {
      const menu = document.getElementById('tabContextMenu');
      menu.innerHTML = `
        <div class="context-menu-item" onclick="tabMenuAction('rename','${account.id}','${escapeHtml(account.name)}')">Rename</div>
        <div class="context-menu-item" onclick="tabMenuAction('reload','${account.id}')">Reload</div>
        <div class="context-menu-divider"></div>
        <div class="context-menu-item danger" onclick="tabMenuAction('remove','${account.id}','${escapeHtml(account.name)}')">Remove</div>
      `;
      menu.style.left = Math.min(x, window.innerWidth - 200) + 'px';
      menu.style.top = Math.min(y, window.innerHeight - 150) + 'px';
      menu.classList.add('visible');

      setTimeout(() => {
        document.addEventListener('click', function closeMenu() {
          menu.classList.remove('visible');
          document.removeEventListener('click', closeMenu);
        });
      }, 10);
    }

    async function tabMenuAction(action, accountId, accountName) {
      const menu = document.getElementById('tabContextMenu');
      menu.classList.remove('visible');

      if (action === 'rename') {
        const newName = await showDialog({
          title: 'Rename Account',
          placeholder: 'Account name',
          defaultValue: accountName,
        });
        if (newName?.trim()) hub.renameAccount(accountId, newName.trim());
      } else if (action === 'reload') {
        hub.reloadAccount(accountId);
      } else if (action === 'remove') {
        const ok = await showDialog({
          title: 'Remove Account',
          message: `Remove "${accountName}"? This will log out of this WhatsApp session.`,
          isConfirm: true,
        });
        if (ok) hub.removeAccount(accountId);
      }
    }

    // ── Render accounts ──
    function renderAccounts(accounts) {
      currentAccounts = accounts;

      const container = document.getElementById('accountTabs');
      container.innerHTML = '';

      accounts.forEach((account) => {
        const item = document.createElement('div');
        item.className = `nav-account-item${account.id === activeId ? ' active' : ''}`;
        item.dataset.id = account.id;
        item.draggable = true;

        const unread = unreadCounts[account.id] || 0;
        const initials = escapeHtml(account.name).substring(0, 1).toUpperCase();

        item.innerHTML = `
          <div class="nav-account-avatar" style="background:${account.color}">
            ${initials}
            <div class="status-dot"></div>
          </div>
          <div class="nav-account-details">
            <div class="nav-account-name">${escapeHtml(account.name)}</div>
          </div>
          <div class="nav-account-badge${unread > 0 ? ' has-unread' : ''}">${unread}</div>
        `;

        // Click to switch
        item.addEventListener('click', () => hub.switchAccount(account.id));

        // Right-click context menu
        item.addEventListener('contextmenu', (e) => {
          e.preventDefault();
          e.stopPropagation();
          showTabContextMenu(e.clientX, e.clientY, account);
        });

        // Double-click to rename
        item.addEventListener('dblclick', async (e) => {
          e.preventDefault();
          const newName = await showDialog({
            title: 'Rename Account',
            placeholder: 'Account name',
            defaultValue: account.name,
          });
          if (newName?.trim()) hub.renameAccount(account.id, newName.trim());
        });

        // Drag to reorder
        item.addEventListener('dragstart', (e) => {
          dragSrcId = account.id;
          item.classList.add('dragging');
          e.dataTransfer.effectAllowed = 'move';
        });
        item.addEventListener('dragend', () => {
          item.classList.remove('dragging');
          dragSrcId = null;
        });
        item.addEventListener('dragover', (e) => {
          e.preventDefault();
          e.dataTransfer.dropEffect = 'move';
        });
        item.addEventListener('drop', (e) => {
          e.preventDefault();
          if (dragSrcId && dragSrcId !== account.id) {
            const ids = currentAccounts.map(a => a.id);
            const from = ids.indexOf(dragSrcId);
            const to = ids.indexOf(account.id);
            ids.splice(from, 1);
            ids.splice(to, 0, dragSrcId);
            hub.reorderAccounts(ids);
          }
        });

        container.appendChild(item);
      });
    }

    // ── Settings ──
    function updateSettingsUI(s) {
      currentSettings = s;
      document.getElementById('dndBanner').classList.toggle('active', !!s.dnd);
      renderAccounts(currentAccounts);
    }

    document.getElementById('dndBanner').addEventListener('click', () => {
      currentSettings.dnd = false;
      hub.updateSettings(currentSettings);
    });

    // ── Tool button handlers (IPC to open child BrowserWindows) ──
    document.getElementById('btnSchedule').addEventListener('click', () => {
      hub.openPanel('schedule');
    });

    document.getElementById('btnTemplates').addEventListener('click', () => {
      hub.openPanel('templates');
    });

    document.getElementById('btnAI').addEventListener('click', () => {
      hub.openPanel('ai');
    });

    document.getElementById('btnBroadcast').addEventListener('click', () => {
      hub.openPanel('broadcast');
    });

    document.getElementById('btnAnalytics').addEventListener('click', () => {
      hub.openPanel('dashboard');
    });

    document.getElementById('btnPairMobile').addEventListener('click', () => {
      hub.openPanel('connect-phone');
    });

    document.getElementById('btnSettings').addEventListener('click', () => {
      hub.openPanel('settings');
    });

    // ── Add account ──
    document.getElementById('addBtn').addEventListener('click', async () => {
      const name = await showDialog({
        title: 'Add WhatsApp Account',
        message: 'Give this account a name so you can identify it.',
        placeholder: 'e.g. Work, Personal, Client Phone',
      });
      if (name?.trim()) hub.addAccount(name.trim());
    });

    // ── Licensing & Upgrade ──
    let currentLicense = { tier: 'free', features: {} };

    async function loadLicense() {
      currentLicense = await hub.getLicense();
      updateLicenseUI();
    }

    function updateLicenseUI() {
      const tier = currentLicense.tier || 'free';
      const tierNames = { free: 'Free Plan', pro: 'Pro Plan', business: 'Business Plan' };
      const footer = document.getElementById('navFooter');
      const upgradeLink = document.getElementById('footerUpgradeLink');

      if (tier === 'free') {
        footer.querySelector('span').textContent = 'Free Plan \u00b7 ';
        upgradeLink.textContent = 'Upgrade';
        upgradeLink.style.display = '';
      } else {
        footer.querySelector('span').textContent = tierNames[tier];
        upgradeLink.style.display = 'none';
      }
    }

    document.getElementById('footerUpgradeLink').addEventListener('click', (e) => {
      e.preventDefault();
      hub.openPanel('upgrade');
    });

    document.getElementById('upgradeBannerBtn').addEventListener('click', () => {
      hub.openPanel('upgrade');
    });

    document.getElementById('upgradeBannerDismiss').addEventListener('click', () => {
      document.getElementById('upgradeBanner').classList.remove('visible');
    });

    // Feature gate check — shows upgrade banner if feature is locked
    async function requireFeature(featureName, friendlyName) {
      const allowed = await hub.checkFeature(featureName);
      if (!allowed) {
        const banner = document.getElementById('upgradeBanner');
        document.getElementById('upgradeBannerText').textContent = `Unlock ${friendlyName} with Pro \u2014 $9/mo`;
        banner.classList.add('visible');
        return false;
      }
      return true;
    }

    hub.onLicenseUpdated((data) => {
      currentLicense = data;
      updateLicenseUI();
    });

    // Load license on start
    setTimeout(loadLicense, 1000);

    // ── Auto-updater ──
    hub.onUpdateReady((data) => {
      const banner = document.getElementById('updateBanner');
      banner.textContent = `Update v${data.version} ready \u2014 click to restart`;
      banner.classList.add('active');
    });

    document.getElementById('updateBanner').addEventListener('click', () => {
      hub.installUpdate();
    });

    // ── Keyboard shortcuts ──
    document.addEventListener('keydown', (e) => {
      // Cmd+1-9: switch accounts
      if (e.metaKey && e.key >= '1' && e.key <= '9') {
        const idx = parseInt(e.key) - 1;
        if (idx < currentAccounts.length) {
          e.preventDefault();
          hub.switchAccount(currentAccounts[idx].id);
        }
      }
      // Cmd+K: command palette (opens as child window)
      if (e.metaKey && e.key === 'k') {
        e.preventDefault();
        hub.openPanel('command-palette');
      }
      // Cmd+,: settings
      if (e.metaKey && e.key === ',') {
        e.preventDefault();
        hub.openPanel('settings');
      }
      // Escape: close upgrade banner
      if (e.key === 'Escape') {
        document.getElementById('upgradeBanner').classList.remove('visible');
      }
    });

    // ── IPC listeners ──
    hub.onLoadAccounts(renderAccounts);
    hub.onAccountSwitched((id) => { activeId = id; renderAccounts(currentAccounts); });
    hub.onSettingsUpdated(updateSettingsUI);
    hub.onUnreadCounts((c) => { unreadCounts = c; renderAccounts(currentAccounts); });
  </script>
</body>
</html>
